name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_MP_PUBLIC_KEY: ${{ secrets.VITE_MP_PUBLIC_KEY }}
          VITE_MP_ACCESS_TOKEN: ${{ secrets.VITE_MP_ACCESS_TOKEN }}
        run: npm run build

      - name: Deploy via SCP to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 217.196.54.114
          port: 65002
          username: u998920878
          password: ${{ secrets.SSH_PASSWORD }}
          source: "dist/*"
          target: /home/u998920878/domains/missolucionesia.com/public_html/
          strip_components: 1
          rm: true

      - name: Deploy Firestore Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

